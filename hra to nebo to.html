<button onclick="typeWriter()">Začínáme</button>

<p id="demo"></p>

<script>
var i = 0;
var txt = 'Je 28. prosince 4068 a život prostých lidí se změnil. Lidstvo postihla zombie apokalypsa. Tvým úkolem bude zachránit lidstvo od ůplnéhého začátku apokalypsy.';
var speed = 85;

function typeWriter() {
  if (i < txt.length) {
    document.getElementById("demo").innerHTML += txt.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}
</script>
